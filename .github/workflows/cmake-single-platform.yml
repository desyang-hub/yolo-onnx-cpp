# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  BUILD_TYPE: Release
  ONNXRUNTIME_VERSION: 1.12.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y           build-essential           cmake           libopencv-dev           wget           tar

    - name: Download ONNX Runtime
      run: |
        wget https://github.com/microsoft/onnxruntime/releases/download/v${{env.ONNXRUNTIME_VERSION}}/onnxruntime-linux-x64-${{env.ONNXRUNTIME_VERSION}}.tgz
        tar -xzf onnxruntime-linux-x64-${{env.ONNXRUNTIME_VERSION}}.tgz
        echo "ONNXRUNTIME_ROOT=$GITHUB_WORKSPACE/onnxruntime-linux-x64-${{env.ONNXRUNTIME_VERSION}}" >> $GITHUB_ENV

    - name: Configure CMake
      run: |
        cmake -B ${{github.workspace}}/build           -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}           -DONNXRUNTIME_ROOT=${{env.ONNXRUNTIME_ROOT}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Verify build
      run: |
        test -f ${{github.workspace}}/build/yolo_onnx_cpu


